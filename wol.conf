server {
  listen 1.2.3.4:80;

  root /var/www/empty;

  server_name boo;

  location / {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;

    proxy_redirect off;
    proxy_pass http://127.0.0.1:8081;
  }
}
